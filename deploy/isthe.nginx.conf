# nginx site config for "Is the ..."
# Place at: /etc/nginx/sites-available/isthe.event.liab
# Enable:   ln -s /etc/nginx/sites-available/isthe.event.liab /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# Assumes the Node app is running on 127.0.0.1:8080 (see isthe.service).

upstream isthe_app {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name isthe.domain;

    # Modest hardening
    server_tokens off;
    client_max_body_size 64k;          # payloads here are tiny JSON blobs

    # Optional: block the admin page/API to trusted networks only.
    # Uncomment and adjust to your LAN range to keep /admin off-limits elsewhere.
    #
    # location = /admin {
    #     allow 192.168.0.0/16;
    #     allow 10.0.0.0/8;
    #     deny all;
    #     proxy_pass http://isthe_app;
    # }
    # location /api/ {
    #     # GET /api/items is public (the landing page needs it); writes already
    #     # require the admin password, so restricting the whole /api/ is optional.
    #     proxy_pass http://isthe_app;
    # }

    location / {
        proxy_pass http://isthe_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 30s;
    }
}

